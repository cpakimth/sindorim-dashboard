<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구로구 실거래가 분석 대시보드</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Kakao Maps -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=70198f22a6d7f73ceed0d6c971a0d94d&autoload=false"></script>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="background-effect"></div>
    <div class="container glass-panel">
        <header>
            <div class="header-title">
                <h1>구로구 실거래가 대시보드 (신도림/구로)</h1>
                <p>구로구 아파트 AI 가치분석 시스템</p>
            </div>
            <div class="controls">
                <div class="control-group">
                    <label for="dongSelect">법정동</label>
                    <select id="dongSelect">
                        <option value="all">전체 동</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="yearSelect">연도</label>
                    <select id="yearSelect">
                        <option value="all">전체 연도</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="aptSelect">아파트 단지</label>
                    <select id="aptSelect">
                        <option value="all">전체 단지</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="areaSelect">면적 (㎡)</label>
                    <select id="areaSelect">
                        <option value="all">전체 면적</option>
                    </select>
                </div>
            </div>
        </header>

        <section class="map-section glass-panel">
            <div id="map" style="width:100%;height:500px;border-radius:8px;"></div>
        </section>

        <div class="stats-row">
            <div class="stat-card glass-panel">
                <h4>총 거래 건수</h4>
                <div id="statCount" class="stat-value">0</div>
            </div>
            <div class="stat-card glass-panel">
                <h4>평균 거래가</h4>
                <div id="statAvg" class="stat-value">0 만원</div>
            </div>
            <div class="stat-card glass-panel ai-card">
                <h4>AI 예측 적정가</h4>
                <div id="statAI" class="stat-value">N/A</div>
            </div>
            <div class="stat-card glass-panel">
                <h4>최고 거래가</h4>
                <div id="statMax" class="stat-value">0 만원</div>
            </div>
        </div>

        <section class="chart-section">
            <canvas id="priceChart"></canvas>
        </section>

        <section class="history-section glass-panel">
            <h3>최근 실거래 내역</h3>
            <div class="table-container">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>계약일</th>
                            <th>법정동</th>
                            <th>아파트</th>
                            <th>전용면적 (㎡)</th>
                            <th>층</th>
                            <th>건축년도</th>
                            <th>거래금액 (만원)</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Data and App Logic -->
    <script src="data.js?v=2"></script>
    <script src="app.js?v=2"></script>
</body>
</html>
